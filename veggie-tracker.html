<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veggie Tracker — 30 Plants a Week</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.2);
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-bg: #E1F5EE;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe9;
      --text-secondary: #9a9a94;
      --border-light: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --green-bg: #0a3326;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--border-light); padding-bottom: 0; }
  .tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text-primary); }
  .panel { display: none; } .panel.active { display: block; }
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .week-nav { display: flex; align-items: center; gap: 12px; }
  .week-label { font-size: 15px; font-weight: 500; min-width: 160px; text-align: center; }
  .nav-btn { border: 0.5px solid var(--border-mid); background: var(--bg-primary); border-radius: var(--radius-md); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
  .nav-btn:hover { background: var(--bg-secondary); }
  .count-badge { font-size: 13px; color: var(--text-secondary); }
  .search-bar { position: relative; margin-bottom: 1rem; }
  .search-bar input { width: 100%; padding: 8px 12px 8px 36px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; }
  .search-bar .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 16px; }
  .cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-btn { padding: 4px 10px; font-size: 12px; border: 0.5px solid var(--border-mid); border-radius: 20px; cursor: pointer; background: var(--bg-primary); color: var(--text-secondary); }
  .cat-btn.active { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-mid); font-weight: 500; }
  .veg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
  .veg-card { border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 10px 10px 8px; cursor: pointer; background: var(--bg-primary); transition: all .15s; display: flex; flex-direction: column; gap: 4px; user-select: none; }
  .veg-card:hover { border-color: var(--border-mid); background: var(--bg-secondary); }
  .veg-card.selected { border: 1.5px solid #1D9E75; background: var(--green-bg); }
  .veg-card.selected .veg-name { color: var(--green); }
  .veg-emoji { font-size: 20px; }
  .veg-name { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
  .veg-cat { font-size: 10px; color: var(--text-secondary); }
  .veg-check { font-size: 12px; color: var(--green); font-weight: 500; }
  .action-bar { display: flex; gap: 8px; margin-top: 1rem; align-items: center; justify-content: space-between; }
  .export-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; cursor: pointer; }
  .export-btn:hover { background: var(--bg-secondary); }
  .save-btn { display: flex; align-items: center; gap: 6px; padding: 8px 20px; border-radius: var(--radius-md); background: var(--green); color: white; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
  .save-btn:hover { background: var(--green-dark); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: white; padding: 10px 16px; border-radius: var(--radius-md); font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
  .trend-section { padding-top: 0.5rem; }
  .trend-bar-wrap { margin-bottom: 8px; }
  .trend-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .trend-bar-name { font-size: 13px; color: var(--text-primary); }
  .trend-bar-count { font-size: 11px; color: var(--text-secondary); }
  .trend-bar-bg { height: 8px; border-radius: 4px; background: var(--bg-secondary); overflow: hidden; }
  .trend-bar-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width .4s; }
  .trend-bar-fill.low { background: #E24B4A; }
  .trend-bar-fill.mid { background: #EF9F27; }
  .no-data { text-align: center; color: var(--text-secondary); font-size: 13px; padding: 2rem; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .stat-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .section-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
  .trend-group { margin-bottom: 1.5rem; }
  .history-week { margin-bottom: 1rem; border: 0.5px solid var(--border-light); border-radius: var(--radius-md); overflow: hidden; }
  .history-week-head { padding: 8px 12px; background: var(--bg-secondary); font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
  .history-week-body { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green-dark); }
  .gh-card { border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; background: var(--bg-primary); }
  .gh-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .gh-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .gh-body ol { padding-left: 1.2rem; line-height: 2; }
  code { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg-secondary); padding: 1px 5px; border-radius: 4px; font-size: 12px; color: var(--text-primary); }
  a { color: var(--green); }
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-leaf"></i> Veggie tracker — 30 plants a week</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')"><i class="ti ti-calendar"></i> Weekly log</button>
    <button class="tab" onclick="switchTab('trends')"><i class="ti ti-chart-bar"></i> Trends</button>
    <button class="tab" onclick="switchTab('history')"><i class="ti ti-history"></i> History</button>
    <button class="tab" onclick="switchTab('github')"><i class="ti ti-brand-github"></i> GitHub sync</button>
  </div>

  <div id="panel-log" class="panel active">
    <div class="week-header">
      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)" aria-label="Previous week"><i class="ti ti-chevron-left"></i></button>
        <span class="week-label" id="week-label"></span>
        <button class="nav-btn" onclick="changeWeek(1)" aria-label="Next week"><i class="ti ti-chevron-right"></i></button>
      </div>
      <span class="count-badge"><span id="sel-count">0</span> / 30 plants</span>
    </div>
    <div class="search-bar">
      <i class="ti ti-search si"></i>
      <input type="text" placeholder="Search vegetables & fruits…" id="search-input" oninput="filterVeg()">
    </div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="veg-grid" id="veg-grid"></div>
    <div class="action-bar">
      <button class="export-btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="save-btn" onclick="saveWeek()"><i class="ti ti-check"></i> Save week</button>
    </div>
  </div>

  <div id="panel-trends" class="panel">
    <div class="trend-section" id="trend-content"></div>
  </div>

  <div id="panel-history" class="panel">
    <div id="history-content"></div>
  </div>

  <div id="panel-github" class="panel">
    <div id="github-content"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const VEGETABLES = [
  {name:"Artichoke",cat:"Vegetables",emoji:"🌿"},{name:"Asparagus",cat:"Vegetables",emoji:"🌿"},{name:"Aubergine",cat:"Vegetables",emoji:"🍆"},{name:"Beetroot",cat:"Root veg",emoji:"🟣"},{name:"Broad beans",cat:"Legumes",emoji:"🫘"},{name:"Broccoli",cat:"Brassicas",emoji:"🥦"},{name:"Brussels sprouts",cat:"Brassicas",emoji:"🥦"},{name:"Butternut squash",cat:"Squash",emoji:"🎃"},{name:"Cabbage",cat:"Brassicas",emoji:"🥬"},{name:"Carrot",cat:"Root veg",emoji:"🥕"},{name:"Cauliflower",cat:"Brassicas",emoji:"🥦"},{name:"Celeriac",cat:"Root veg",emoji:"🌿"},{name:"Celery",cat:"Vegetables",emoji:"🌿"},{name:"Chard",cat:"Leafy greens",emoji:"🥬"},{name:"Chicory",cat:"Leafy greens",emoji:"🌿"},{name:"Courgette",cat:"Squash",emoji:"🥒"},{name:"Cucumber",cat:"Squash",emoji:"🥒"},{name:"Edamame",cat:"Legumes",emoji:"🫘"},{name:"Fennel",cat:"Vegetables",emoji:"🌿"},{name:"French beans",cat:"Legumes",emoji:"🫘"},{name:"Garlic",cat:"Alliums",emoji:"🧄"},{name:"Jerusalem artichoke",cat:"Root veg",emoji:"🌿"},{name:"Kale",cat:"Brassicas",emoji:"🥬"},{name:"Leek",cat:"Alliums",emoji:"🌿"},{name:"Lettuce",cat:"Leafy greens",emoji:"🥬"},{name:"Mangetout",cat:"Legumes",emoji:"🫘"},{name:"Mushroom",cat:"Fungi",emoji:"🍄"},{name:"Onion",cat:"Alliums",emoji:"🧅"},{name:"Pak choi",cat:"Brassicas",emoji:"🥬"},{name:"Parsnip",cat:"Root veg",emoji:"🌿"},{name:"Peas",cat:"Legumes",emoji:"🫛"},{name:"Pepper",cat:"Vegetables",emoji:"🌶️"},{name:"Potato",cat:"Root veg",emoji:"🥔"},{name:"Pumpkin",cat:"Squash",emoji:"🎃"},{name:"Purple sprouting broccoli",cat:"Brassicas",emoji:"🥦"},{name:"Radish",cat:"Root veg",emoji:"🌿"},{name:"Runner beans",cat:"Legumes",emoji:"🫘"},{name:"Shallot",cat:"Alliums",emoji:"🧅"},{name:"Spinach",cat:"Leafy greens",emoji:"🥬"},{name:"Spring onion",cat:"Alliums",emoji:"🌿"},{name:"Swede",cat:"Root veg",emoji:"🌿"},{name:"Sweetcorn",cat:"Vegetables",emoji:"🌽"},{name:"Sweet potato",cat:"Root veg",emoji:"🍠"},{name:"Tomato",cat:"Vegetables",emoji:"🍅"},{name:"Turnip",cat:"Root veg",emoji:"🌿"},{name:"Watercress",cat:"Leafy greens",emoji:"🌿"},
  {name:"Apple",cat:"Fruits",emoji:"🍎"},{name:"Apricot",cat:"Fruits",emoji:"🍑"},{name:"Avocado",cat:"Fruits",emoji:"🥑"},{name:"Banana",cat:"Fruits",emoji:"🍌"},{name:"Blackberry",cat:"Berries",emoji:"🫐"},{name:"Blackcurrant",cat:"Berries",emoji:"🫐"},{name:"Blueberry",cat:"Berries",emoji:"🫐"},{name:"Cherry",cat:"Fruits",emoji:"🍒"},{name:"Clementine",cat:"Citrus",emoji:"🍊"},{name:"Cranberry",cat:"Berries",emoji:"🫐"},{name:"Date",cat:"Fruits",emoji:"🌿"},{name:"Fig",cat:"Fruits",emoji:"🫐"},{name:"Grape",cat:"Fruits",emoji:"🍇"},{name:"Grapefruit",cat:"Citrus",emoji:"🍊"},{name:"Kiwi",cat:"Fruits",emoji:"🥝"},{name:"Lemon",cat:"Citrus",emoji:"🍋"},{name:"Lime",cat:"Citrus",emoji:"🍋"},{name:"Mango",cat:"Tropical",emoji:"🥭"},{name:"Melon",cat:"Fruits",emoji:"🍈"},{name:"Nectarine",cat:"Fruits",emoji:"🍑"},{name:"Orange",cat:"Citrus",emoji:"🍊"},{name:"Papaya",cat:"Tropical",emoji:"🌿"},{name:"Passion fruit",cat:"Tropical",emoji:"🌿"},{name:"Peach",cat:"Fruits",emoji:"🍑"},{name:"Pear",cat:"Fruits",emoji:"🍐"},{name:"Pineapple",cat:"Tropical",emoji:"🍍"},{name:"Plum",cat:"Fruits",emoji:"🫐"},{name:"Pomegranate",cat:"Fruits",emoji:"🌿"},{name:"Raspberry",cat:"Berries",emoji:"🫐"},{name:"Rhubarb",cat:"Fruits",emoji:"🌿"},{name:"Strawberry",cat:"Berries",emoji:"🍓"},{name:"Watermelon",cat:"Fruits",emoji:"🍉"}
];

let state = { currentWeek: getWeekKey(new Date()), data: {}, filter: '', category: 'All' };
try { const s = localStorage.getItem('vegtracker'); if(s) state.data = JSON.parse(s); } catch(e){}

function getWeekKey(d) {
  const jan1 = new Date(d.getFullYear(),0,1);
  const wk = Math.ceil(((d - jan1)/86400000 + jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function weekKeyToLabel(k) {
  const [y,w] = k.split('-W');
  const jan1 = new Date(+y,0,1);
  const days = (jan1.getDay()<=4?1-jan1.getDay():8-jan1.getDay());
  const mon = new Date(jan1.getTime()+(+w-1)*7*86400000+days*86400000);
  const sun = new Date(mon.getTime()+6*86400000);
  const fmt = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return `${fmt(mon)} – ${fmt(sun)}`;
}
function changeWeek(dir) {
  const [y,w] = state.currentWeek.split('-W');
  const d = new Date(+y,0,(+w)*7);
  d.setDate(d.getDate()+dir*7);
  state.currentWeek = getWeekKey(d);
  renderLog();
}
function getCurrentSelected() { return (state.data[state.currentWeek]||[]); }
function isSelected(name) { return getCurrentSelected().includes(name); }

function renderLog() {
  document.getElementById('week-label').textContent = weekKeyToLabel(state.currentWeek);
  document.getElementById('sel-count').textContent = getCurrentSelected().length;
  const cats = ['All',...new Set(VEGETABLES.map(v=>v.cat))];
  document.getElementById('cat-filter').innerHTML = cats.map(c=>`<button class="cat-btn${state.category===c?' active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');
  filterVeg();
}
function setCategory(c) { state.category=c; renderLog(); }
function filterVeg() {
  const q = (document.getElementById('search-input')||{value:''}).value.toLowerCase();
  const items = VEGETABLES.filter(v => {
    const matchQ = !q || v.name.toLowerCase().includes(q) || v.cat.toLowerCase().includes(q);
    const matchC = state.category==='All' || v.cat===state.category;
    return matchQ && matchC;
  });
  document.getElementById('veg-grid').innerHTML = items.map(v => {
    const s = isSelected(v.name);
    return `<div class="veg-card${s?' selected':''}" onclick="toggleVeg('${v.name}')" role="checkbox" aria-checked="${s}" tabindex="0" onkeydown="if(event.key===' ')toggleVeg('${v.name}')">
      <span class="veg-emoji">${v.emoji}</span>
      <span class="veg-name">${v.name}</span>
      <span class="veg-cat">${v.cat}</span>
      ${s?'<span class="veg-check"><i class="ti ti-check"></i> added</span>':''}
    </div>`;
  }).join('');
}
function toggleVeg(name) {
  const sel = [...getCurrentSelected()];
  const idx = sel.indexOf(name);
  if(idx>=0) sel.splice(idx,1); else sel.push(name);
  state.data[state.currentWeek] = sel;
  save(); renderLog();
}
function saveWeek() {
  save();
  const n = getCurrentSelected().length;
  showToast(`Week saved! ${n} plant${n!==1?'s':''} logged ✓`);
}
function save() {
  try { localStorage.setItem('vegtracker', JSON.stringify(state.data)); } catch(e){}
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function exportCSV() {
  const rows = [['Week','Date range','Vegetables & Fruits','Count']];
  Object.entries(state.data).sort().forEach(([k,v])=>{
    rows.push([k, weekKeyToLabel(k), v.join('; '), v.length]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'veggie-tracker.csv'; a.click();
  showToast('CSV exported!');
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'veggie-tracker.json'; a.click();
  showToast('JSON exported!');
}

function renderTrends() {
  const all = {}; VEGETABLES.forEach(v=>{ all[v.name]=0; });
  Object.values(state.data).forEach(list=>list.forEach(n=>{ if(all[n]!==undefined) all[n]++; }));
  const totalWeeks = Object.keys(state.data).length;
  const sorted = Object.entries(all).sort((a,b)=>a[1]-b[1]);
  const maxCount = Math.max(...Object.values(all),1);
  const c = document.getElementById('trend-content');
  if(!totalWeeks){ c.innerHTML='<div class="no-data"><i class="ti ti-leaf" style="font-size:32px"></i><p style="margin-top:8px">Save some weeks first to see trends.</p></div>'; return; }
  const never = sorted.filter(([,n])=>n===0);
  const rare = sorted.filter(([,n])=>n>0&&n<=Math.ceil(totalWeeks*0.3));
  const good = sorted.filter(([,n])=>n>Math.ceil(totalWeeks*0.3));
  const sectionHTML = (title, items, colorClass) => {
    if(!items.length) return '';
    return `<div class="trend-group">
      <div class="section-label">${title}</div>
      ${items.slice(0,20).map(([name,count])=>{
        const pct = Math.round((count/maxCount)*100);
        const veg = VEGETABLES.find(v=>v.name===name)||{emoji:'🌿'};
        return `<div class="trend-bar-wrap">
          <div class="trend-bar-header">
            <span class="trend-bar-name">${veg.emoji} ${name}</span>
            <span class="trend-bar-count">${count} / ${totalWeeks} weeks</span>
          </div>
          <div class="trend-bar-bg"><div class="trend-bar-fill ${colorClass}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  };
  c.innerHTML = `<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${totalWeeks}</div><div class="stat-lbl">Weeks tracked</div></div>
    <div class="stat-card"><div class="stat-val">${Object.values(all).filter(n=>n>0).length}</div><div class="stat-lbl">Plants tried</div></div>
    <div class="stat-card"><div class="stat-val">${never.length}</div><div class="stat-lbl">Never eaten</div></div>
  </div>` + sectionHTML('Rarely eaten — try these!', [...rare,...never].slice(0,15), 'low') + sectionHTML('Occasionally', rare.slice(0,10), 'mid') + sectionHTML('Regulars', good.slice(-10).reverse(), '');
}

function renderHistory() {
  const c = document.getElementById('history-content');
  const weeks = Object.keys(state.data).sort().reverse();
  if(!weeks.length){ c.innerHTML='<div class="no-data">No history yet. Start logging!</div>'; return; }
  c.innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:1rem"><button class="export-btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export all as CSV</button></div>` +
    weeks.map(k=>{
      const items = state.data[k]||[];
      const isCurrent = k===getWeekKey(new Date());
      return `<div class="history-week">
        <div class="history-week-head"><span>${weekKeyToLabel(k)}${isCurrent?' (this week)':''}</span><span style="color:var(--text-secondary)">${items.length} plants</span></div>
        <div class="history-week-body">${items.map(n=>{ const v=VEGETABLES.find(x=>x.name===n)||{emoji:'🌿'}; return `<span class="pill">${v.emoji} ${n}</span>`; }).join('')}</div>
      </div>`;
    }).join('');
}

function renderGithub() {
  document.getElementById('github-content').innerHTML = `
    <div class="gh-card">
      <div class="gh-title"><i class="ti ti-file-code"></i> Option 1 — JSON file in a repo (simplest)</div>
      <div class="gh-body">
        <p style="margin-bottom:8px">Export your data as JSON and commit it to a GitHub repo. Great for version history.</p>
        <ol>
          <li>Click Export JSON below, rename to <code>veggie-tracker.json</code></li>
          <li>Create a repo: <code>gh repo create veggie-tracker --public</code></li>
          <li>Commit: <code>git add . && git commit -m "week update" && git push</code></li>
        </ol>
      </div>
    </div>
    <div class="gh-card">
      <div class="gh-title"><i class="ti ti-brand-github"></i> Option 2 — GitHub Gist (quickest)</div>
      <div class="gh-body">
        <p style="margin-bottom:8px">Store your data as a secret Gist — private, versioned, accessible anywhere.</p>
        <ol>
          <li>Go to <a href="https://gist.github.com" target="_blank">gist.github.com</a></li>
          <li>Create a secret gist called <code>veggie-tracker.json</code></li>
          <li>Paste your exported JSON each week to update it</li>
        </ol>
      </div>
    </div>
    <div class="gh-card">
      <div class="gh-title"><i class="ti ti-api"></i> Option 3 — GitHub API auto-sync</div>
      <div class="gh-body">
        <p style="margin-bottom:8px">Fully automated: push directly to a Gist on save using a personal access token (PAT).</p>
        <ol>
          <li>Create a GitHub PAT with <code>gist</code> scope at <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a></li>
          <li>Create an empty Gist and note its ID from the URL</li>
          <li>Ask Claude to wire up the "Sync to GitHub" button using <code>PATCH /gists/{id}</code></li>
        </ol>
        <p style="margin-top:8px;font-size:12px">Note: store your PAT in the browser only — never commit it.</p>
      </div>
    </div>
    <div style="margin-top:0.5rem">
      <button class="export-btn" onclick="exportJSON()"><i class="ti ti-file-export"></i> Export data as JSON</button>
    </div>`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['log','trends','history','github'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='trends') renderTrends();
  if(tab==='history') renderHistory();
  if(tab==='github') renderGithub();
}

renderLog();
</script>
